  <body>
    <div id="root"></div>
    <script>
      document.addEventListener('click', function (event) {
        const contactLink = event.target.closest('a[href$="#contato"]');

        if (contactLink && contactLink.origin === window.location.origin) {
          event.preventDefault();
          window.history.replaceState(null, '', contactLink.href);
          window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
        }

        document.querySelectorAll('.nav-dropdown[open]').forEach(function (dropdown) {
          const clickedInsideDropdown = dropdown.contains(event.target);
          const clickedMenuLink = event.target.closest('.nav-dropdown-menu a');

          if (!clickedInsideDropdown || clickedMenuLink) {
            dropdown.removeAttribute('open');
          }
        });
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
